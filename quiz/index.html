    <!-- Quiz Event Tracking Bridge -->
    <script>
    /* Listens for custom events the React app can dispatch, OR observes the DOM
       for natural quiz progression. Either way GA4 + Meta get the events. */
    (function(){
        function safeGtag(name, params){ try { if(window.gtag) window.gtag('event', name, params || {}); } catch(e){} }
        function safeFbq(name, params){ try { if(window.fbq) window.fbq('track', name, params || {}); } catch(e){} }
        function safeFbqCustom(name, params){ try { if(window.fbq) window.fbq('trackCustom', name, params || {}); } catch(e){} }

        // 1) Custom event bridge — React app can call:
        //    window.dispatchEvent(new CustomEvent('quiz:start'))
        //    window.dispatchEvent(new CustomEvent('quiz:step', {detail:{step:3}}))
        //    window.dispatchEvent(new CustomEvent('quiz:complete', {detail:{score:78,type:'rent-to-own'}}))
        //    window.dispatchEvent(new CustomEvent('quiz:lead', {detail:{email:'...'}}))
        window.addEventListener('quiz:start', function(e){
            safeGtag('quiz_start', e.detail || {});
            safeFbqCustom('QuizStart', e.detail || {});
        });
        window.addEventListener('quiz:step', function(e){
            safeGtag('quiz_step', e.detail || {});
        });
        window.addEventListener('quiz:complete', function(e){
            safeGtag('quiz_complete', e.detail || {});
            safeFbq('CompleteRegistration', e.detail || {});
        });
        window.addEventListener('quiz:lead', function(e){
            safeGtag('generate_lead', Object.assign({value: 25, currency: 'USD'}, e.detail || {}));
            safeFbq('Lead', Object.assign({value: 25, currency: 'USD'}, e.detail || {}));
        });

        // 2) Fallback DOM observer — fires quiz_start the first time the user
        //    interacts with any button/input inside #root
        var started = false;
        function markStart(){
            if(started) return; started = true;
            safeGtag('quiz_start', {trigger: 'dom-interaction'});
            safeFbqCustom('QuizStart', {trigger: 'dom-interaction'});
        }
        document.addEventListener('click', function(ev){
            var root = document.getElementById('root');
            if(root && root.contains(ev.target)) markStart();
        }, true);

        // 3) Calendly bookings = strong lead signal (Calendly embed fires postMessage)
        window.addEventListener('message', function(e){
            if(!e || !e.data) return;
            var d = e.data;
            if(typeof d === 'object' && d.event && String(d.event).indexOf('calendly') === 0){
                if(d.event === 'calendly.event_scheduled'){
                    safeGtag('generate_lead', {value: 100, currency: 'USD', source: 'calendly_booking'});
                    safeFbq('Schedule', {value: 100, currency: 'USD'});
                    safeFbq('Lead', {value: 100, currency: 'USD', content_name: 'calendly_booking'});
                }
            }
        });
    })();
    </script>
